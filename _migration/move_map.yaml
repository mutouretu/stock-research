moves:
  - from: ../market-data-hub
    to: platform/data/market-data-hub
    action: move
    status: migrated
    notes: "Imported from https://github.com/mutouretu/market-data-hub and synchronized after cn-tushare-cache-merge landed on main, at merge commit b2c19a0. Kept the market_data_hub package name, CLI contract, and upstream business logic unchanged. Functionality validation completed in Phase 2.5: US live smoke, real CN single-day download, and CN synthetic merge/export passed."

  - from: ../shared_data
    to: storage/shared_data
    action: move
    status: migrated
    notes: "Moved locally with mv (not cp) into storage/shared_data; no data files were added to Git. Created compatibility symlink ../shared_data -> migration/storage/shared_data for legacy projects while the local repository directory retains its temporary migration name."

  - from: ../stock-pattern-search
    to: research/pattern/stock-pattern-search
    action: move
    status: migrated
    notes: "Imported from https://github.com/mutouretu/stock-pattern-search at main commit 806078b using a clean clone because the parent working tree had an unrelated local modification. Preserved strategy, reviewer, configuration, package/import, and CLI behavior; only added a README note for the canonical storage/shared_data path. Compile, 56 tests, CLI help, and local research_ml_core import passed."

  - from: ../market_pattern_labeler
    to: research/pattern/market_pattern_labeler
    action: move
    status: migrated
    notes: "Imported from https://github.com/mutouretu/market_pattern_labeler at main commit 3815e42. Preserved the market_pattern_labeler package, mplabeler CLI, and business logic. Compile and 68 tests passed; check-data-dir read 5 shared-data parquet files and an AAPL-only Type-N miner smoke generated 10 candidates in /tmp."

  - from: ../alpha_agent_system
    to: automation/alpha_agent_system
    action: move
    status: pending
    notes: "Move from the parent directory without refactoring agent behavior."

  - from: ../build-daily-cache
    to: null
    action: delete_or_archive
    status: blocked_pending_verification
    notes: "Phase 2.5 confirms core CN download/retry/increment/merge coverage, including a real single-day CN download. Deletion remains blocked: XLSX label conversion, labels/schema generation, pickle compatibility, local credentials, and about 299 MiB of historical assets still require disposition."

new_projects:
  - path: platform/data/research-data-core
    package: research_data_core
    action: create
    status: created
    notes: "Created an independent configuration-driven data interface layer with workspace/shared-data path resolution, YAML dataset catalog, bounded CSV/parquet loaders, schema checks, entity/time normalization, generic as-of alignment, inspection scripts, documentation, and tests. No business project imports were switched."

  - path: platform/ml/research-ml-core
    package: research_ml_core
    action: create
    status: partially_extracted
    notes: "Created a minimal independent package for strategy-neutral feature transforms, forward labels, time splits, model adapters, training, evaluation, and backtest metrics. Five core tests pass. No stock-pattern-search consumer imports were switched in this phase, so existing business behavior remains unchanged."

  - path: research/cycle/cycle-equity-research
    package: cycle_equity_research
    action: create
    status: created
    notes: "Created the independently installable CF-first cycle-equity research skeleton with instrument and research-data-core compatible dataset contracts, placeholder feature boundaries, planning-only pipelines, four read-only CLI entry points, and tests. No physical data, model, training, report, or business integration was added."
