    notes: "Shared data lake. May contain large untracked files; use mv instead of git mv if not tracked."

  - from: stock-pattern-search
    to: research/pattern/stock-pattern-search
    status: pending
    action: move
    notes: "Keep business logic unchanged. Update only paths and references."

  - from: market_pattern_labeler
    to: research/pattern/market_pattern_labeler
